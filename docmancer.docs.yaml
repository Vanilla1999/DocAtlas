version: 1
targets:
  - id: pydantic
    library: pydantic
    ecosystem: python
    docs_url: https://docs.pydantic.dev/latest/
    allowed_domains:
      - docs.pydantic.dev
  - id: pydantic-settings
    library: pydantic-settings
    ecosystem: python
    docs_url: https://docs.pydantic.dev/latest/
    allowed_domains:
      - docs.pydantic.dev
  - id: click
    library: click
    ecosystem: python
    docs_url: https://click.palletsprojects.com/en/stable/
    allowed_domains:
      - click.palletsprojects.com
    seed_urls:
      - https://click.palletsprojects.com/en/stable/
      - https://click.palletsprojects.com/en/stable/quickstart/
      - https://click.palletsprojects.com/en/stable/parameters/
      - https://click.palletsprojects.com/en/stable/options/
      - https://click.palletsprojects.com/en/stable/arguments/
      - https://click.palletsprojects.com/en/stable/commands/
      - https://click.palletsprojects.com/en/stable/api/
  - id: httpx
    library: httpx
    ecosystem: python
    docs_url: https://www.python-httpx.org/
    allowed_domains:
      - www.python-httpx.org
  - id: trafilatura
    library: trafilatura
    ecosystem: python
    docs_url: https://trafilatura.readthedocs.io/en/latest/
    allowed_domains:
      - trafilatura.readthedocs.io
  - id: beautifulsoup4
    library: beautifulsoup4
    ecosystem: python
    docs_url: https://www.crummy.com/software/BeautifulSoup/bs4/doc/
    allowed_domains:
      - www.crummy.com
  - id: qdrant-client
    library: qdrant-client
    ecosystem: python
    docs_url: https://qdrant.tech/documentation/
    allowed_domains:
      - qdrant.tech
  - id: fastembed
    library: fastembed
    ecosystem: python
    docs_url: https://github.com/qdrant/fastembed
    allowed_domains:
      - github.com
  - id: pytest
    library: pytest
    ecosystem: python
    docs_url: https://docs.pytest.org/en/stable/
    allowed_domains:
      - docs.pytest.org
