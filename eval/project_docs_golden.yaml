corpus_snapshot: docmancer-project-docs-v1
items:
  - id: project_context7_gap
    query: What is the gap between Context7 and Docmancer project docs?
    taxonomy_class: project_docs_positioning
    expected_sources:
      - source: DOCMANCER_PRODUCT_BRIEF.md
      - source: roadmap/08_next_wedge_project_docs.md
  - id: project_docs_official_files
    query: Why should official project docs remain files in the repo?
    taxonomy_class: project_docs_policy
    expected_sources:
      - source: roadmap/08_project_docs/00_product_framing.md
  - id: discovery_first_workflow
    query: What should an agent call first for repo-specific architecture questions?
    taxonomy_class: agent_workflow
    expected_sources:
      - source: roadmap/08_project_docs/01_agent_discoverable_onboarding.md
  - id: mcp_project_docs_surface
    query: Which MCP tools inspect, ingest, and query project-owned docs?
    taxonomy_class: mcp_surface
    expected_sources:
      - source: roadmap/08_project_docs/02_mcp_cli_surface.md
  - id: project_docs_pr_sequence
    query: What PRs implement project docs discovery, ingest, filters, and get_project_docs?
    taxonomy_class: roadmap_sequence
    expected_sources:
      - source: roadmap/08_project_docs/03_pr_sequence.md
  - id: demos_evals_metrics
    query: What demos and metrics prove the project docs wedge works?
    taxonomy_class: evaluation_metrics
    expected_sources:
      - source: roadmap/08_project_docs/04_demos_evals_metrics.md
  - id: stable_project_identity
    query: What open questions remain around stable project identity and stale state?
    taxonomy_class: open_questions
    expected_sources:
      - source: roadmap/08_project_docs/05_open_questions.md
  - id: project_docs_readme_quickstart
    query: How do I index this project's docs for a coding agent?
    taxonomy_class: quickstart
    expected_sources:
      - source: README.md
      - source: docs/project-docs-demo.md
  - id: riverpod_dartdoc_extraction
    query: How to use Riverpod with Flutter for state management?
    taxonomy_class: docs_quality_regression
    expected_behavior: Dartdoc extraction succeeds or returns actionable candidates, not opaque extraction failure.
  - id: unknown_python_mcp_discovery
    query: How to create an MCP server with tools and resources in Python?
    taxonomy_class: docs_quality_regression
    expected_behavior: Unknown library response includes discovery_candidates and retry next_action.
  - id: code_symbol_mcp_server
    query: What are the main Python classes and functions that implement the MCP server?
    taxonomy_class: docs_quality_regression
    expected_behavior: Returns concrete files/classes or insufficient_code_symbol_evidence, not generic wiki answer.
  - id: fastapi_internal_noise
    query: How to create a FastAPI application with routing and dependency injection?
    taxonomy_class: docs_quality_regression
    forbidden_concepts:
      - "TODO: remove when discarding"
      - "incorrect type specification"
  - id: empty_sections_filtered
    query: How to use httpx AsyncClient?
    taxonomy_class: docs_quality_regression
    forbidden_low_value_sections:
      - Developer Interface
  - id: compact_output_size
    query: What is the architecture of this project?
    taxonomy_class: docs_quality_regression
    expected_behavior: compact mode omits raw duplicated project_docs.results
