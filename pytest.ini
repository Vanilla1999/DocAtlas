[pytest]
asyncio_mode = auto
testpaths = tests
norecursedirs =
    .cache
    .git
    .pytest_cache
    .ruff_cache
    .uv
    .venv
    __pycache__
    archive-v0
    build
    dist
    eval/task_level/fixtures
    eval/task_level/hidden_tests
    eval/task_level/oracles
    eval/task_level/results
    eval/task_level/runtime
    eval/task_level/workspaces
    materialized
    node_modules
    results
    runtime
    uv-cache
    venv
    wheels-v6
    workspaces
markers =
    integration: live/integration quality checks runnable with pytest tests/docs/test_project_context_live_quality.py -m integration
