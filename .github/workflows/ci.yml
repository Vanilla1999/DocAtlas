name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DOCMANCER_OFFLINE: "1"

jobs:
  docs-contract:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Verify documented CLI and public Docs MCP contracts
        run: |
          pytest -q \
            tests/docs/test_user_facing_docs_branding.py \
            tests/docs/test_documented_cli_contract.py \
            tests/docs/test_mcp_docs_tools_registration.py \
            tests/docs/test_tool_choice_eval.py \
            tests/test_cli.py \
            tests/test_support_surface_policy.py

  docs-impact:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install DocAtlas
        run: pip install -e .

      - name: Report documentation impact
        run: doc-atlas docs-impact --project-path . --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}" --format markdown >> "$GITHUB_STEP_SUMMARY"

  installer-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Installer smoke tests
        run: sh scripts/test-install.sh

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run offline core tests
        run: pytest tests/ -m "not advanced and not live and not live_network" -v

  advanced-contract:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run offline advanced contract and shared-security tests
        run: pytest tests/ -m advanced -v

      - name: Run critical mutation gate
        run: python scripts/run_critical_mutation_gate.py

      - name: Upload critical mutation gate artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: critical-mutation-gate-${{ github.run_id }}
          path: ${{ runner.temp }}/docmancer-mutation-*
          if-no-files-found: warn
          retention-days: 14
