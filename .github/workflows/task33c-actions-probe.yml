name: Task 33C Actions probe

on:
  workflow_dispatch:
    inputs:
      run_causal_pilot:
        description: Run the one-task/four-lane GitHub Models engineering pilot
        required: false
        default: false
        type: boolean
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/task33c-actions-probe.yml"
      - "docmancer/docs/interfaces/mcp/context_tools.py"
      - "eval/task_level/**"
      - "tests/task_level/**"
      - "roadmap/33_TASK23_FAILURE_ANALYSIS_AND_CONTEXT_PIVOT.md"

permissions:
  contents: read
  models: read

concurrency:
  group: task33c-actions-probe-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DOCMANCER_OFFLINE: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  capability-probe:
    name: Sandbox and frozen-retrieval probe
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes bubblewrap

      - name: Install DocAtlas
        run: pip install -e ".[dev]"

      - name: Record runner capabilities
        run: |
          mkdir -p task33c-actions-probe
          python - <<'PY'
          import json
          import platform
          import shutil
          import subprocess
          from pathlib import Path

          def command(command):
              process = subprocess.run(
                  command,
                  text=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.STDOUT,
                  check=False,
              )
              return {
                  "command": command,
                  "returncode": process.returncode,
                  "output": process.stdout[-20_000:],
              }

          report = {
              "schema_version": 1,
              "platform": platform.platform(),
              "bubblewrap": shutil.which("bwrap"),
              "docker": shutil.which("docker"),
              "bubblewrap_version": command(["bwrap", "--version"]),
              "docker_version": command(["docker", "version"]),
              "docker_info": command(["docker", "info"]),
          }
          Path("task33c-actions-probe/environment.json").write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Probe GitHub Models usage accounting
        id: model
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          from pathlib import Path

          model = "openai/gpt-4.1-mini"
          payload = {
              "model": model,
              "messages": [{"role": "user", "content": "Reply with the single word READY."}],
              "max_tokens": 16,
              "temperature": 0,
              "stream": True,
              "stream_options": {"include_usage": True},
          }
          request = urllib.request.Request(
              "https://models.github.ai/inference/chat/completions",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Accept": "text/event-stream",
                  "Authorization": "Bearer " + os.environ["GITHUB_TOKEN"],
                  "Content-Type": "application/json",
                  "X-GitHub-Api-Version": "2026-03-10",
              },
              method="POST",
          )
          report = {"schema_version": 1, "status": "failed", "provider": "github-models", "model": model}
          try:
              with urllib.request.urlopen(request, timeout=45) as response:
                  request_ids = {
                      name: response.headers.get(name)
                      for name in ("x-github-request-id", "x-ms-request-id", "apim-request-id")
                      if response.headers.get(name)
                  }
                  chunks = []
                  usage = None
                  for raw_line in response:
                      line = raw_line.decode("utf-8", errors="replace").strip()
                      if not line.startswith("data:"):
                          continue
                      data = line.removeprefix("data:").strip()
                      if data == "[DONE]":
                          continue
                      event = json.loads(data)
                      if isinstance(event.get("usage"), dict):
                          usage = event["usage"]
                      for choice in event.get("choices", []):
                          delta = choice.get("delta", {}) if isinstance(choice, dict) else {}
                          if isinstance(delta.get("content"), str):
                              chunks.append(delta["content"])
                  report.update({
                      "request_ids": request_ids,
                      "usage": usage,
                      "response": "".join(chunks),
                  })
          except urllib.error.HTTPError as exc:
              report["http_status"] = exc.code
              report["error"] = exc.read(2_000).decode("utf-8", errors="replace")
          except Exception as exc:
              report["error"] = exc.__class__.__name__ + ":" + str(exc)[:1_000]

          usage = report.get("usage")
          token_fields = ("prompt_tokens", "completion_tokens", "total_tokens")
          verified = (
              isinstance(usage, dict)
              and all(isinstance(usage.get(name), int) and not isinstance(usage.get(name), bool) for name in token_fields)
              and usage["prompt_tokens"] > 0
              and usage["completion_tokens"] > 0
              and usage["total_tokens"] == usage["prompt_tokens"] + usage["completion_tokens"]
              and bool(report.get("request_ids"))
          )
          report["status"] = "verified" if verified else "failed"
          Path("task33c-actions-probe/model-usage-probe.json").write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          if not verified:
              raise SystemExit("GitHub Models usage accounting was not verified")
          PY

      - name: Run executable sandbox canary
        id: sandbox
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          from eval.task_level.isolated_delivery import JsonSubprocessIsolatedWorker

          worker = JsonSubprocessIsolatedWorker(
              command=("/usr/bin/python3", "-c", "raise SystemExit(0)"),
              compressor_identity="task33c-actions-canary-v1",
              environment={},
              sandbox_executable="/usr/bin/bwrap",
          )
          report = worker.capability_evidence
          Path("task33c-actions-probe/sandbox-canary.json").write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          if report.get("status") != "verified":
              raise SystemExit("Task 33C bubblewrap canary was not verified")
          PY

      - name: Run Docker sandbox canary
        id: docker
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          script = r'''
          cwd_writable=true
          touch /canary 2>/dev/null || cwd_writable=false
          workspace_visible=false
          test -e /workspace && workspace_visible=true
          network_reachable=true
          wget -q -T 1 -O /tmp/network-check https://example.com 2>/dev/null || network_reachable=false
          sleep 30 &
          printf '{"cwd":"%s","cwd_writable":%s,"workspace_visible":%s,"network_reachable":%s,"detached_descendant_spawned":true}\n' \
            "$(pwd)" "$cwd_writable" "$workspace_visible" "$network_reachable"
          '''
          command = [
              "docker", "run", "--rm", "--pull=always",
              "--network", "none",
              "--read-only",
              "--pids-limit", "64",
              "--memory", "256m",
              "--cpus", "1",
              "--cap-drop", "ALL",
              "--security-opt", "no-new-privileges",
              "--user", "65532:65532",
              "--tmpfs", "/tmp:rw,noexec,nosuid,nodev,size=16m",
              "alpine:3.22",
              "sh", "-ec", script,
          ]
          process = subprocess.run(
              command,
              text=True,
              stdout=subprocess.PIPE,
              stderr=subprocess.PIPE,
              timeout=30,
              check=False,
          )
          try:
              checks = json.loads(process.stdout)
          except json.JSONDecodeError:
              checks = {}
          expected = {
              "cwd": "/",
              "cwd_writable": False,
              "workspace_visible": False,
              "network_reachable": False,
              "detached_descendant_spawned": True,
          }
          verified = process.returncode == 0 and checks == expected
          report = {
              "schema_version": 1,
              "status": "verified" if verified else "failed",
              "backend": "docker",
              "image": "alpine:3.22",
              "command_policy": {
                  "network": "none",
                  "read_only_root": True,
                  "user": "65532:65532",
                  "cap_drop": "ALL",
                  "no_new_privileges": True,
                  "pids_limit": 64,
                  "memory": "256m",
                  "cpus": 1,
                  "workspace_mounted": False,
              },
              "returncode": process.returncode,
              "checks": checks,
              "stderr": process.stderr[-2_000:],
          }
          Path("task33c-actions-probe/docker-sandbox-canary.json").write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          if not verified:
              raise SystemExit("Task 33C Docker canary was not verified")
          PY

      - name: Run frozen host-retrieval probe
        id: retrieval
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          import tempfile
          from pathlib import Path

          from eval.task_level.execution import _prepare_shared_task33_evidence
          from eval.task_level.runner import load_tasks
          from eval.task_level.task33_pilot import (
              TASK33C_PILOT_TASK_ID,
              TASK33C_REQUIRED_EVIDENCE_CATEGORIES,
          )

          task = next(task for task in load_tasks() if task.task_id == TASK33C_PILOT_TASK_ID)
          with tempfile.TemporaryDirectory(prefix="task33c-actions-retrieval-") as temp_dir:
              evidence, preparation = _prepare_shared_task33_evidence(task, Path(temp_dir), 0)

          missing_categories = sorted(
              set(TASK33C_REQUIRED_EVIDENCE_CATEGORIES) - set(evidence.evidence_categories)
          )
          report = {
              "schema_version": 1,
              "status": evidence.response_status,
              "query": evidence.query,
              "query_derivation": evidence.query_derivation,
              "retrieval_calls": evidence.retrieval_calls,
              "retrieval_issues": list(evidence.retrieval_issues),
              "evidence_count": len(evidence.evidence_items),
              "evidence_categories": list(evidence.evidence_categories),
              "evidence_fingerprint": evidence.fingerprint,
              "missing_required_categories": missing_categories,
              "preparation_status": preparation.get("status"),
          }
          Path("task33c-actions-probe/frozen-retrieval.json").write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          if (
              evidence.response_status != "success"
              or evidence.retrieval_calls != 1
              or evidence.retrieval_issues
              or not evidence.evidence_items
              or missing_categories
          ):
              raise SystemExit("Task 33C frozen retrieval was not usable")
          PY

      - name: Run focused adversarial tests
        id: focused
        continue-on-error: true
        run: pytest tests/task_level/test_task33_isolated_delivery.py -q

      - name: Publish probe summary
        if: always()
        run: |
          {
            echo "## Task 33C Actions probe"
            echo
            echo "| Check | Outcome |"
            echo "| --- | --- |"
            echo "| bubblewrap sandbox canary | ${{ steps.sandbox.outcome }} |"
            echo "| Docker sandbox canary | ${{ steps.docker.outcome }} |"
            echo "| GitHub Models usage | ${{ steps.model.outcome }} |"
            echo "| frozen host retrieval | ${{ steps.retrieval.outcome }} |"
            echo "| focused adversarial tests | ${{ steps.focused.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload probe evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task33c-actions-probe-${{ github.run_id }}
          path: task33c-actions-probe/
          if-no-files-found: error
          retention-days: 14

      - name: Enforce probe gate
        if: always()
        env:
          SANDBOX_OUTCOME: ${{ steps.sandbox.outcome }}
          DOCKER_OUTCOME: ${{ steps.docker.outcome }}
          MODEL_OUTCOME: ${{ steps.model.outcome }}
          RETRIEVAL_OUTCOME: ${{ steps.retrieval.outcome }}
          FOCUSED_OUTCOME: ${{ steps.focused.outcome }}
        run: |
          if test "$SANDBOX_OUTCOME" != success && test "$DOCKER_OUTCOME" != success; then
            echo "No verified sandbox backend is available"
            exit 1
          fi
          test "$MODEL_OUTCOME" = success
          test "$RETRIEVAL_OUTCOME" = success
          test "$FOCUSED_OUTCOME" = success

  causal-pilot:
    name: GitHub Models causal pilot
    if: github.event_name == 'workflow_dispatch' && inputs.run_causal_pilot
    needs: capability-probe
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install DocAtlas
        run: pip install -e ".[dev]"

      - name: Run controlled GitHub Models pilot
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TASK33C_GITHUB_MODEL: openai/gpt-4.1-mini
        run: |
          python -m eval.task_level.runner \
            --task33c-pilot \
            --tasks decisive_nbo_cross_module_gate_large_001 \
            --runner-factory eval.task_level.github_models:create_github_models_runner \
            --isolated-worker-factory eval.task_level.github_models:create_github_models_worker \
            --verify-runner \
            --verify-docatlas-tool \
            --model openai/gpt-4.1-mini \
            --timeout-seconds 900 \
            --isolated-worker-timeout-seconds 90 \
            --run-id "task33c_github_models_${GITHUB_RUN_ID}"

      - name: Publish pilot decision
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          run_dir = Path("eval/task_level/results") / f"task33c_github_models_{os.environ['GITHUB_RUN_ID']}"
          completeness_path = run_dir / "task33c_completeness.json"
          if completeness_path.exists():
              completeness = json.loads(completeness_path.read_text(encoding="utf-8"))
              lines = [
                  "## Task 33C GitHub Models pilot",
                  "",
                  f"Decision: **{completeness.get('decision')}**",
                  "",
                  f"Complete: `{completeness.get('complete')}`",
                  "",
                  "Errors: " + (", ".join(completeness.get("errors", [])) or "none"),
              ]
          else:
              lines = ["## Task 33C GitHub Models pilot", "", "Pilot did not produce a completeness artifact."]
          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          PY

      - name: Upload causal pilot evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task33c-github-models-pilot-${{ github.run_id }}
          path: eval/task_level/results/task33c_github_models_${{ github.run_id }}/
          if-no-files-found: warn
          retention-days: 30
