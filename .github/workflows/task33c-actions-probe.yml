name: Task 33C trusted causal pilot

on:
  workflow_dispatch:
    inputs:
      run_causal_pilot:
        description: Run the frozen one-task/four-lane causal pilot after the capability probe
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: task33c-causal-pilot-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCMANCER_OFFLINE: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TASK33C_GITHUB_MODEL: openai/gpt-4o-mini
  TASK33C_BASE_IMAGE: python:3.14.6-slim@sha256:d3400aa122fa42cf0af0dbe8ec3091b047eac5c8f7e3539f7135e86d855dc015
  TASK33C_EVALUATOR_REQUIREMENTS_SHA256: 6ae3eade04b844c3f42d8d56b2001fd117729c0f1ae2f68cab50f417d3bea681

jobs:
  capability-probe:
    name: Trusted structured-model and sandbox probe
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      models: read

    steps:
      - name: Checkout trusted ref without persisted credentials
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install frozen harness
        run: python -m pip install -e ".[dev]"

      - name: Probe production structured GitHub Models adapter
        id: model
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p task33c-actions-probe
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          from eval.task_level.github_models import run_github_models_capability_probe

          report = run_github_models_capability_probe(
              os.environ["GITHUB_TOKEN"],
              model=os.environ["TASK33C_GITHUB_MODEL"],
          )
          Path("task33c-actions-probe/model-usage-probe.json").write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          if report.get("status") != "verified":
              raise SystemExit("production structured GitHub Models adapter was not verified")
          PY

      - name: Run live Docker adversarial canaries
        id: docker
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          from eval.task_level.sandbox_execution import DockerCommandSandbox

          report = DockerCommandSandbox(os.environ["TASK33C_BASE_IMAGE"]).verify()
          Path("task33c-actions-probe/docker-sandbox-canary.json").write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          if report.get("status") != "verified":
              raise SystemExit("Task 33C Docker adversarial canaries were not verified")
          PY

      - name: Run frozen host-retrieval probe
        id: retrieval
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          import tempfile
          from pathlib import Path

          from eval.task_level.execution import _prepare_shared_task33_evidence
          from eval.task_level.runner import load_tasks
          from eval.task_level.task33_pilot import (
              TASK33C_PILOT_TASK_ID,
              TASK33C_REQUIRED_EVIDENCE_CATEGORIES,
              TASK33C_REQUIRED_EVIDENCE_PATHS,
          )

          task = next(task for task in load_tasks() if task.task_id == TASK33C_PILOT_TASK_ID)
          with tempfile.TemporaryDirectory(prefix="task33c-actions-retrieval-") as temp_dir:
              evidence, preparation = _prepare_shared_task33_evidence(task, Path(temp_dir), 0)
          paths = {str(item.get("path") or "") for item in evidence.evidence_items}
          missing_categories = sorted(set(TASK33C_REQUIRED_EVIDENCE_CATEGORIES) - set(evidence.evidence_categories))
          missing_paths = sorted(set(TASK33C_REQUIRED_EVIDENCE_PATHS) - paths)
          report = {
              "schema_version": 1,
              "status": evidence.response_status,
              "query": evidence.query,
              "query_derivation": evidence.query_derivation,
              "retrieval_calls": evidence.retrieval_calls,
              "retrieval_issues": list(evidence.retrieval_issues),
              "evidence_count": len(evidence.evidence_items),
              "evidence_categories": list(evidence.evidence_categories),
              "evidence_fingerprint": evidence.fingerprint,
              "project_revision": evidence.project_revision,
              "index_revision": evidence.index_revision,
              "missing_required_categories": missing_categories,
              "missing_required_paths": missing_paths,
              "preparation_status": preparation.get("status"),
          }
          Path("task33c-actions-probe/frozen-retrieval.json").write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          if (
              evidence.response_status != "success"
              or evidence.retrieval_calls != 1
              or evidence.retrieval_issues
              or not evidence.evidence_items
              or missing_categories
              or missing_paths
          ):
              raise SystemExit("Task 33C frozen retrieval was not usable")
          PY

      - name: Run focused hardening tests
        id: focused
        continue-on-error: true
        run: |
          pytest -q \
            tests/docs/test_action_packet.py \
            tests/task_level/test_github_models_adapter.py \
            tests/task_level/test_task33_isolated_delivery.py \
            tests/task_level/test_task33_validation.py

      - name: Upload capability evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: task33c-capability-probe-${{ github.run_id }}
          path: task33c-actions-probe/
          if-no-files-found: error
          retention-days: 14

      - name: Enforce capability gate
        if: always()
        env:
          MODEL_OUTCOME: ${{ steps.model.outcome }}
          DOCKER_OUTCOME: ${{ steps.docker.outcome }}
          RETRIEVAL_OUTCOME: ${{ steps.retrieval.outcome }}
          FOCUSED_OUTCOME: ${{ steps.focused.outcome }}
        run: |
          test "$MODEL_OUTCOME" = success
          test "$DOCKER_OUTCOME" = success
          test "$RETRIEVAL_OUTCOME" = success
          test "$FOCUSED_OUTCOME" = success

  causal-pilot:
    name: Frozen GitHub Models causal pilot
    if: inputs.run_causal_pilot
    needs: capability-probe
    runs-on: ubuntu-latest
    timeout-minutes: 55
    environment: task33c-causal-pilot
    permissions:
      contents: read
      models: read

    steps:
      - name: Checkout trusted ref without persisted credentials
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Set up fixture Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.14"

      - name: Install pinned uv and prewarm frozen fixture dependencies
        env:
          UV_CACHE_DIR: ${{ runner.temp }}/task33c-uv-cache
          UV_PROJECT_ENVIRONMENT: ${{ runner.temp }}/task33c-prewarm-environment
        run: |
          python -m pip install "uv==0.9.25"
          mkdir -p "${RUNNER_TEMP}/task33c-prewarm-project"
          cp eval/task_level/fixtures/templates/decisive_nbo_cross_module_gate_large_001/pyproject.toml \
            "${RUNNER_TEMP}/task33c-prewarm-project/pyproject.toml"
          cd "${RUNNER_TEMP}/task33c-prewarm-project"
          uv sync --python 3.14

      - name: Set up harness Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install frozen harness
        run: |
          python -m pip install "uv==0.9.25"
          python -m pip install -e ".[dev]"

      - name: Build digest-pinned evaluator sandbox with hash-locked packages
        env:
          TASK33C_SANDBOX_IMAGE: docatlas-task33c-evaluator:${{ github.sha }}
        run: |
          docker build --pull --tag "$TASK33C_SANDBOX_IMAGE" --file - . <<DOCKERFILE
          FROM --platform=linux/amd64 ${TASK33C_BASE_IMAGE}
          COPY eval/task_level/task33c_evaluator_requirements.txt /tmp/requirements.txt
          RUN python -m pip install --no-cache-dir --require-hashes -r /tmp/requirements.txt
          DOCKERFILE
          image_id="$(docker image inspect --format '{{.Id}}' "$TASK33C_SANDBOX_IMAGE")"
          echo "TASK33C_TEST_CONTAINER_IMAGE=$TASK33C_SANDBOX_IMAGE" >> "$GITHUB_ENV"
          mkdir -p task33c-sandbox-image
          printf '%s\n' "$image_id" > task33c-sandbox-image/image-id.txt
          printf '%s\n' "$TASK33C_BASE_IMAGE" > task33c-sandbox-image/base-image.txt
          sha256sum eval/task_level/task33c_evaluator_requirements.txt \
            > task33c-sandbox-image/requirements.sha256

      - name: Run controlled frozen pilot
        id: pilot
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          UV_CACHE_DIR: ${{ runner.temp }}/task33c-uv-cache
          TASK33C_REQUIRE_DOCKER_SANDBOX: "1"
        run: |
          python -m eval.task_level.runner \
            --task33c-pilot \
            --tasks decisive_nbo_cross_module_gate_large_001 \
            --runner-factory eval.task_level.github_models:create_github_models_runner \
            --isolated-worker-factory eval.task_level.github_models:create_github_models_worker \
            --verify-runner \
            --verify-docatlas-tool \
            --model openai/gpt-4o-mini \
            --timeout-seconds 900 \
            --isolated-worker-timeout-seconds 90 \
            --run-id "task33c_github_models_${GITHUB_RUN_ID}"

      - name: Recompute independent validation and stage allowlisted evidence
        id: validation
        if: always()
        continue-on-error: true
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          import shutil
          from pathlib import Path

          from eval.task_level.task33_validation import validate_task33c_run

          run_dir = Path("eval/task_level/results") / f"task33c_github_models_{os.environ['GITHUB_RUN_ID']}"
          validation = validate_task33c_run(run_dir)
          manifest = json.loads((run_dir / "task33c_artifact_manifest.json").read_text(encoding="utf-8"))
          upload = Path("task33c-upload")
          for item in manifest["files"]:
              source = run_dir / item["path"]
              if hashlib.sha256(source.read_bytes()).hexdigest() != item["sha256"]:
                  raise SystemExit("artifact changed after independent validation: " + item["path"])
              destination = upload / "run" / item["path"]
              destination.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(source, destination)
          for name in ("task33c_artifact_manifest.json", "task33c_validation.json"):
              destination = upload / "run" / name
              destination.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(run_dir / name, destination)
          shutil.copytree("task33c-sandbox-image", upload / "sandbox-image", dirs_exist_ok=True)
          if validation.get("valid") is not True:
              raise SystemExit("Task 33C independent validation is INCONCLUSIVE")
          PY

      - name: Publish independent decision
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("eval/task_level/results") / f"task33c_github_models_{os.environ['GITHUB_RUN_ID']}" / "task33c_validation.json"
          if path.is_file():
              result = json.loads(path.read_text(encoding="utf-8"))
              lines = [
                  "## Task 33C independent validation",
                  "",
                  f"Verdict: **{result.get('verdict')}**",
                  "",
                  f"Valid: `{result.get('valid')}`",
                  "",
                  "Errors: " + (", ".join(result.get("errors", [])) or "none"),
              ]
          else:
              lines = ["## Task 33C independent validation", "", "Validation artifact is missing."]
          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          PY

      - name: Upload allowlisted causal evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: task33c-causal-evidence-${{ github.run_id }}
          path: task33c-upload/
          if-no-files-found: warn
          retention-days: 30

      - name: Enforce independent validation gate
        if: always()
        env:
          VALIDATION_OUTCOME: ${{ steps.validation.outcome }}
        run: test "$VALIDATION_OUTCOME" = success
